name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  schema:
    name: Build schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build -w packages/schema
      - uses: actions/upload-artifact@v4
        with:
          name: schema-dist
          path: packages/schema/dist

  ingestion-api:
    name: Build and test ingestion-api
    runs-on: ubuntu-latest
    needs: schema
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: schema-dist
          path: packages/schema/dist
      - run: npm run build -w ingestion-api
      - run: npm test -w ingestion-api

  mcp-server:
    name: Build and test mcp-server
    runs-on: ubuntu-latest
    needs: schema
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: schema-dist
          path: packages/schema/dist
      - run: npm run build -w mcp-server
      - run: npm test -w mcp-server
